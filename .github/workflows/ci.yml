name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Ubuntu runners ship with Android SDK, .NET, Haskell GHC, large
      # Docker images, etc. The cargo workspace + target dir has been
      # exhausting the remaining ~14 GB and crashing the worker with
      # "No space left on device". Free ~30 GB up front.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          # Keep swap — the Rust linker needs it for debug-mode test
          # binaries; removing swap crashes `ld` with SIGBUS on the
          # big workspace binary (e.g. liblocalrouter + all test bins).
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-targets: "true"

      - name: Cache model catalog
        uses: actions/cache@v4
        with:
          path: crates/lr-catalog/catalog/
          key: catalog-${{ github.run_id }}
          restore-keys: catalog-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check
